services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: budgy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgy}
      POSTGRES_DB: budgy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgy"]
      interval: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BUDGY_DOMAIN: ${BUDGY_DOMAIN:-budgy.yourdomain.com}
    depends_on:
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
