name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'backend/**'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'requirements.txt'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          # S303 is ok (bandit warns about md5, but we use it for hashing)
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check for syntax errors
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/core/db.py
          python -m py_compile backend/app/models/*.py

  test:
    runs-on: ubuntu-latest
    name: Run Tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: budgy
          POSTGRES_PASSWORD: budgy
          POSTGRES_DB: budgy
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://budgy:budgy@localhost:5432/budgy
          SECRET_KEY: test-secret-key-12345
          DEBUG: false
        run: |
          cd backend
          alembic upgrade head

      - name: Verify database connection
        env:
          DATABASE_URL: postgresql://budgy:budgy@localhost:5432/budgy
        run: |
          python -c "from app.core.db import engine; engine.connect(); print('✅ Database connection successful')"

      - name: Check API imports
        run: |
          python -c "from backend.app.main import app; print('✅ API imports successful')"
          python -c "from backend.app.api.routes.sync import router; print('✅ Sync router imports successful')"
          python -c "from backend.app.api.routes.auth import router; print('✅ Auth router imports successful')"

  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: budgy-backend:${{ github.sha }}

  status-check:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    name: All Checks Passed

    steps:
      - name: ✅ Backend checks passed
        if: success()
        run: echo "All backend checks passed! Ready for deployment."

      - name: ❌ Backend checks failed
        if: failure()
        run: |
          echo "Backend checks failed. Please fix the issues before deployment."
          exit 1
