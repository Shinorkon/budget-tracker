# Auto-deploy backend to VPS on push
name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'deploy-contabo.sh'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to VPS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            cd /root/budget-tracker

            # Drop any local changes and match remote exactly
            git stash drop || true
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            git clean -fd -e .env -e backend/.env

            # Production port override
            export API_PORT=8001

            # Rebuild and deploy backend
            docker compose up -d --build backend
            sleep 5

            # Health check
            echo "Checking backend health..."
            if curl -sf http://localhost:8001/health; then
              echo "Backend is healthy!"
            else
              echo "Health check failed"
              docker compose logs --tail=30 backend
              exit 1
            fi

      - name: Notify deployment success
        if: success()
        run: echo "✅ Backend deployed successfully to VPS"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Backend deployment failed"
