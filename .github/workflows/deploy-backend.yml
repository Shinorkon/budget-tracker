name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'deploy-contabo.sh'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to VPS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            cd /root/budgy || { mkdir -p /root/budgy && cd /root/budgy; }

            # Pull latest changes
            if [ -d ".git" ]; then
              git pull origin main || git pull origin master || true
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Deploy backend
            cd backend

            # If running with Docker
            if command -v docker &> /dev/null && [ -f docker-compose.yml ]; then
              docker compose up -d --build
              sleep 10
              docker compose exec -T backend alembic upgrade head || true
            fi

            # If running with systemd/uvicorn directly
            if systemctl is-active --quiet budgy-backend 2>/dev/null; then
              sudo systemctl restart budgy-backend
              sleep 5
            fi

            # Health check
            echo "Checking backend health..."
            if curl -sf http://localhost:8001/health || curl -sf http://localhost:8000/health; then
              echo "✅ Backend is healthy!"
            else
              echo "⚠️ Health check failed — backend may need manual restart"
            fi

      - name: Notify deployment success
        if: success()
        run: echo "✅ Backend deployed successfully to VPS"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Backend deployment failed"
